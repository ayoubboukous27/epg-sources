name: Grab beIN Sports MENA AR EPG (7 days + logos)

on:
  schedule:
    - cron: "0 5 * * *"  # تحديث يوميًا الساعة 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grab_bein_mena_ar:
    runs-on: ubuntu-latest

    steps:
      # --------------------------
      # Checkout repository
      # --------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------
      # Setup Node.js (latest stable)
      # --------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --------------------------
      # Clone iptv-org/epg
      # --------------------------
      - name: Clone iptv-org/epg
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          else
            git -C epg pull
          fi

      # --------------------------
      # Install dependencies
      # --------------------------
      - name: Install dependencies
        run: |
          cd epg
          npm install

      # --------------------------
      # Grab beIN Sports MENA AR EPG (7 days)
      # --------------------------
      - name: Grab beIN Sports MENA AR EPG
        run: |
          cd epg
          CHANNEL_FILE="sites/beinsports.com/beinsports.com_mena-ar.channels.xml"
          npm run grab --- --channels=$CHANNEL_FILE --days=7

      # --------------------------
      # Save guide.xml
      # --------------------------
      - name: Save guide.xml
        run: |
          mkdir -p public
          cp epg/guide.xml public/epg-bein-mena-ar.xml
          echo "✅ Full 7-day EPG saved to public/epg-bein-mena-ar.xml"

      # --------------------------
      # Add custom channel logos
      # --------------------------
      - name: Add custom beIN Sports logos
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = 'public/epg-bein-mena-ar.xml';
          let xml = fs.readFileSync(path, 'utf8');

          const logos = {
            "beINSports1.qa@MENA": "https://upload.wikimedia.org/wikipedia/commons/6/6c/1-HD.png",
            "beINSports2.qa@MENA": "https://upload.wikimedia.org/wikipedia/commons/5/51/2-HD.png",
            "beINSports3.qa@MENA": "https://upload.wikimedia.org/wikipedia/commons/f/fe/3-HD.png",
            "beINSports4.qa@MENA": "https://upload.wikimedia.org/wikipedia/commons/d/d1/4-HD.png",
            "beINSports5.qa@MENA": "https://upload.wikimedia.org/wikipedia/commons/f/f5/5-HD.png",
            "beINSports6.qa@MENA": "https://upload.wikimedia.org/wikipedia/commons/1/1d/6-HD.png",
            "beINSports7.qa@MENA": "https://upload.wikimedia.org/wikipedia/commons/2/27/7-HD.png",
            "beINSports8.qa@MENA": "https://upload.wikimedia.org/wikipedia/commons/c/cf/8-HD.png",
            "beINSports9.qa@MENA": "https://upload.wikimedia.org/wikipedia/commons/2/2f/9-HD.png"
          };

          xml = xml.replace(/(<channel[^>]*xmltv_id="([^"]+)"[^>]*>)([\s\S]*?)(<\/channel>)/gi,
            (match, start, xmltv_id, middle, end) => {
              if (logos[xmltv_id]) {
                // إزالة أي شعار موجود مسبقًا
                let cleaned = middle.replace(/<icon[^>]*\/>/gi, '');
                return `${start}<icon src="${logos[xmltv_id]}"/>${cleaned}${end}`;
              }
              return match;
            }
          );

          fs.writeFileSync(path, xml);
          console.log('✅ Custom logos applied');
          EOF

      # --------------------------
      # Commit & Push
      # --------------------------
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-bein-mena-ar.xml
          git diff-index --quiet HEAD || git commit -m "Update beIN Sports MENA AR EPG (7 days + logos)"
          git pull --rebase origin master
          git push origin master
