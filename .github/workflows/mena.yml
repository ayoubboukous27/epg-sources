name: Grab beIN Sports MENA AR EPG (full programs)

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grab_bein_mena_ar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clone iptv-org/epg
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          else
            git -C epg pull

      - name: Install dependencies
        run: |
          cd epg
          npm install

      - name: Grab beIN Sports MENA AR EPG
        run: |
          cd epg
          CHANNEL_FILE="sites/beinsports.com/beinsports.com_mena-ar.channels.xml"
          npm run grab --- --channels=$CHANNEL_FILE

      - name: Save guide.xml
        run: |
          mkdir -p public
          cp epg/guide.xml public/epg-bein-mena-ar.xml
          echo "✅ Full EPG saved to public/epg-bein-mena-ar.xml"

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-bein-mena-ar.xml
          git diff-index --quiet HEAD || git commit -m "Update full beIN Sports MENA AR EPG"
          git pull --rebase origin master
          git push origin master
