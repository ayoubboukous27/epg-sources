name: Grab beIN Sports MENA AR EPG with Logos

on:
  schedule:
    - cron: "0 5 * * *"  # تحديث يوميًا الساعة 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grab_bein_mena_ar:
    runs-on: ubuntu-latest

    steps:
      # --------------------------
      # Checkout repository
      # --------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------
      # Setup Node.js (latest stable)
      # --------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "node"

      # --------------------------
      # Clone iptv-org/epg repository
      # --------------------------
      - name: Clone iptv-org/epg
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          else
            git -C epg pull
          fi

      # --------------------------
      # Install dependencies
      # --------------------------
      - name: Install dependencies
        run: |
          cd epg
          npm install

      # --------------------------
      # Grab beIN Sports MENA AR EPG
      # --------------------------
      - name: Grab beIN Sports MENA AR EPG
        run: |
          cd epg
          npm run grab --- --channels=sites/beinsports.com/beinsports.com_mena-ar.channels.xml
          npm run channels:parse --- --config=./sites/beinsports.com/beinsports.com.config.js \
            --output=./sites/beinsports.com/beinsports.com_mena-ar.channels.xml \
            --set=region:mena --set=lang:ar

      # --------------------------
      # Apply logos by site_id
      # --------------------------
      - name: Add Logos by site_id
        run: |
          node << 'EOF'
          const fs = require('fs');
          let xml = fs.readFileSync('epg/guide.xml', 'utf8');

          const logos = {
            "7836FEA9-6B39-4A1A-8352-DC5FCB97A16C": "https://upload.wikimedia.org/wikipedia/commons/6/6c/1-HD.png",
            "008F0EA9-FCD9-4E8C-849A-913979E7450A": "https://upload.wikimedia.org/wikipedia/commons/5/51/2-HD.png",
            "8AEA2426-D451-4BA5-BF48-114A1F04B1A8": "https://upload.wikimedia.org/wikipedia/commons/f/fe/3-HD.png",
            "42680C3C-580F-43DA-BDD8-02651BD10F32": "https://upload.wikimedia.org/wikipedia/commons/d/d1/4-HD.png",
            "964E6246-CA95-410B-82C4-EA75DD979435": "https://upload.wikimedia.org/wikipedia/commons/f/f5/5-HD.png",
            "2BF668DF-1B76-4199-88CE-8691FD86AD8C": "https://upload.wikimedia.org/wikipedia/commons/1/1d/6-HD.png",
            "A892063B-A5D9-4199-95AC-6A214515FA6B": "https://upload.wikimedia.org/wikipedia/commons/2/27/7-HD.png",
            "0F8D20A4-D46C-4B18-9242-8E7B3E978FF8": "https://upload.wikimedia.org/wikipedia/commons/c/cf/8-HD.png",
            "5C08D9D3-C713-4F1F-947E-87C761428B9B": "https://upload.wikimedia.org/wikipedia/commons/2/2f/9-HD.png"
          };

          xml = xml.replace(/(<channel[^>]*site_id="([^"]+)".*?>)/gi, (match, start, id) => {
            if (logos[id]) {
              return start.replace(/>$/, `><icon src="${logos[id]}"/>`);
            }
            return match;
          });

          fs.writeFileSync('epg/guide.xml', xml);
          console.log('✅ Logos applied by site_id');
          EOF

      # --------------------------
      # Save XML
      # --------------------------
      - name: Save XML
        run: |
          mkdir -p public
          cp epg/guide.xml public/epg-bein-mena-ar.xml
          echo "✅ EPG saved to public/epg-bein-mena-ar.xml"

      # --------------------------
      # Commit & Push
      # --------------------------
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-bein-mena-ar.xml
          git diff-index --quiet HEAD || git commit -m "Update beIN Sports MENA AR EPG with logos"
          git pull --rebase origin master
          git push origin master
