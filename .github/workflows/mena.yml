name: Update beIN Sports MENA EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-beinsports-mena:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: 📂 Clone iptv-org/epg
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git epg

      - name: 📦 Install dependencies
        run: |
          cd epg
          npm install

      - name: 🔧 Generate channels file for MENA (Arabic)
        run: |
          cd epg
          npm run channels:parse -- \
            --config=./sites/beinsports.com/beinsports.com.config.js \
            --output=./sites/beinsports.com/beinsports.com_mena-ar.channels.xml \
            --set=region:mena \
            --set=lang:ar

      - name: ▶️ Run grab using channels file
        run: |
          cd epg
          npm run grab -- \
            --channels=./sites/beinsports.com/beinsports.com_mena-ar.channels.xml \
            --days=7

      - name: 🔧 Fix channel display names for Tivimate
        run: |
          cd epg
          python3 << 'PYTHON_SCRIPT'
          import xml.etree.ElementTree as ET

          # Load the guide.xml file
          tree = ET.parse('guide.xml')
          root = tree.getroot()

          # Modify each channel: set display-name to match channel id
          for channel in root.findall('channel'):
              channel_id = channel.get('id', '')
              
              # Remove any existing display-name elements
              for display_name in channel.findall('display-name'):
                  channel.remove(display_name)
              
              # Add new display-name with the channel id
              display_name_en = ET.SubElement(channel, 'display-name')
              display_name_en.text = channel_id
              
              # Add Arabic display-name (same value)
              display_name_ar = ET.SubElement(channel, 'display-name')
              display_name_ar.text = channel_id
              display_name_ar.set('lang', 'ar')

          # Save the modified guide.xml
          ET.indent(tree, space='  ')
          tree.write('guide.xml', encoding='UTF-8', xml_declaration=True)
          PYTHON_SCRIPT

      - name: 📂 Copy final guide.xml to public folder
        run: |
          mkdir -p public
          cp epg/guide.xml public/beinsports_mena_ar_epg.xml

      - name: 💾 Commit and push the updated EPG file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add public/beinsports_mena_ar_epg.xml

          if ! git diff --cached --quiet; then
            git commit -m "Update beIN Sports MENA EPG (7 days)"
          fi

          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          git pull --rebase origin $BRANCH
          git push origin $BRANCH
