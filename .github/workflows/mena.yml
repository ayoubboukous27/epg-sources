name: Grab beIN Sports MENA AR EPG (7 days with logos)

on:
  schedule:
    - cron: "0 5 * * *"  # تحديث يوميًا الساعة 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grab_bein_mena_ar:
    runs-on: ubuntu-latest

    steps:
      # --------------------------
      # Checkout repository
      # --------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------
      # Setup Node.js (latest stable)
      # --------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "node"

      # --------------------------
      # Clone iptv-org/epg repository
      # --------------------------
      - name: Clone iptv-org/epg
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          else
            git -C epg pull
          fi

      # --------------------------
      # Install dependencies
      # --------------------------
      - name: Install dependencies
        run: |
          cd epg
          npm install

      # --------------------------
      # Grab beIN Sports MENA AR EPG (7 days)
      # --------------------------
      - name: Grab beIN Sports MENA AR EPG
        run: |
          cd epg
          npm run grab --- --site=beinsports.com --channels=sites/beinsports.com/beinsports.com_mena-ar.channels.xml --days=7

      # --------------------------
      # Save guide.xml as public EPG
      # --------------------------
      - name: Save guide.xml
        run: |
          mkdir -p public
          cp epg/guide.xml public/epg-bein-mena-ar.xml

      # --------------------------
      # Add custom logos by site_id
      # --------------------------
      - name: Add beIN logos (by site_id)
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = 'public/epg-bein-mena-ar.xml';
          let xml = fs.readFileSync(path, 'utf8');

          const logos = {
            "7836FEA9-6B39-4A1A-8352-DC5FCB97A16C": "https://upload.wikimedia.org/wikipedia/commons/6/6c/1-HD.png", // beIN 1
            "FD1DD7DD-1E7B-4AA2-8682-BFA17338E653": "https://upload.wikimedia.org/wikipedia/commons/5/51/2-HD.png", // beIN 2
            "8AEA2426-D451-4BA5-BF48-114A1F04B1A8": "https://upload.wikimedia.org/wikipedia/commons/f/fe/3-HD.png", // beIN 3
            "DB9361E8-B3EB-4D6F-9A82-75B5F09E2F92": "https://upload.wikimedia.org/wikipedia/commons/d/d1/4-HD.png", // beIN 4
            "964E6246-CA95-410B-82C4-EA75DD979435": "https://upload.wikimedia.org/wikipedia/commons/f/f5/5-HD.png", // beIN 5
            "E24D9C11-A8B4-4C7F-AD3E-B3364FB6D5A2": "https://upload.wikimedia.org/wikipedia/commons/1/1d/6-HD.png", // beIN 6
            "A892063B-A5D9-4199-95AC-6A214515FA6B": "https://upload.wikimedia.org/wikipedia/commons/2/27/7-HD.png", // beIN 7
            "0F8D20A4-D46C-4B18-9242-8E7B3E978FF8": "https://upload.wikimedia.org/wikipedia/commons/c/cf/8-HD.png", // beIN 8
            "5C08D9D3-C713-4F1F-947E-87C761428B9B": "https://upload.wikimedia.org/wikipedia/commons/2/2f/9-HD.png"  // beIN 9
          };

          xml = xml.replace(/(<channel[^>]*site_id="([^"]+)"[^>]*>)([\s\S]*?)(<\/channel>)/gi,
            (match, start, site_id, middle, end) => {
              if (logos[site_id]) {
                let cleaned = middle.replace(/<icon[^>]*\/>/gi, '');
                return `${start}<icon src="${logos[site_id]}"/>${cleaned}${end}`;
              }
              return match;
            }
          );

          fs.writeFileSync(path, xml);
          console.log("✅ Logos applied using site_id");
          EOF

      # --------------------------
      # Commit & Push
      # --------------------------
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-bein-mena-ar.xml
          git diff-index --quiet HEAD || git commit -m "Update beIN Sports MENA AR EPG with logos"
          git pull --rebase origin main
          git push origin main
