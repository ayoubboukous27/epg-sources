name: Update beIN Sports MENA EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-beinsports-mena:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: 📂 Clone iptv-org/epg
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git epg

      - name: 📦 Install dependencies
        run: |
          cd epg
          npm install

      - name: 🔧 Generate channels file for MENA (Arabic)
        run: |
          cd epg
          npm run channels:parse -- \
            --config=./sites/beinsports.com/beinsports.com.config.js \
            --output=./sites/beinsports.com/beinsports.com_mena-ar.channels.xml \
            --set=region:mena \
            --set=lang:ar

      - name: ▶️ Run grab using channels file
        run: |
          cd epg
          npm run grab -- \
            --channels=./sites/beinsports.com/beinsports.com_mena-ar.channels.xml \
            --days=7

      - name: 🔧 Fix XML to use channel id as display-name
        run: |
          cd epg
          
          # استخدام Python لتعديل ملف guide.xml
          python3 << 'PYTHON_SCRIPT'
          import xml.etree.ElementTree as ET
          
          # قراءة ملف guide.xml
          tree = ET.parse('guide.xml')
          root = tree.getroot()
          
          # تعديل كل قناة: جعل display-name نفس الـ id
          for channel in root.findall('channel'):
              channel_id = channel.get('id', '')
              
              # حذف جميع display-name الموجودة
              for display_name in channel.findall('display-name'):
                  channel.remove(display_name)
              
              # إضافة display-name جديد بنفس الـ id
              display_name = ET.SubElement(channel, 'display-name')
              display_name.text = channel_id
              
              # إضافة display-name بالعربية
              display_name_ar = ET.SubElement(channel, 'display-name')
              display_name_ar.text = channel_id
              display_name_ar.set('lang', 'ar')
          
          # حفظ الملف المعدل
          ET.indent(tree, space='  ')
          tree.write('guide.xml', encoding='UTF-8', xml_declaration=True)
          PYTHON_SCRIPT

      - name: 📂 Copy guide.xml to public
        run: |
          mkdir -p public
          cp epg/guide.xml public/beinsports_mena_ar_epg.xml

      - name: 💾 Commit & Push XML safely
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add public/beinsports_mena_ar_epg.xml

          if ! git diff --cached --quiet; then
            git commit -m "Update beIN Sports MENA EPG (7 days)"
          fi

          # تحديد اسم الفرع الصحيح تلقائياً
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          
          git pull --rebase origin $BRANCH
          git push origin $BRANCH
